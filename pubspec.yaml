name: medcalc
description: Aplicativo médico para cálculos clínicos e farmacológicos.

publish_to: 'none'

version: 3.7.3+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  string_similarity: ^2.0.0
  expansion_tile_card: ^3.0.0
  shared_preferences: ^2.2.2
  # Dependências do módulo PCR
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.0
  cupertino_icons: ^1.0.8
  audioplayers: ^6.1.0
  http: ^1.6.0
  flutter_dotenv: ^6.0.0
  supabase_flutter: ^2.5.0
  file_picker: ^10.3.8
  path_provider: ^2.1.5
  google_mlkit_barcode_scanning: ^0.14.1
  syncfusion_flutter_pdf: ^32.1.23
  pdfx: ^2.9.2
  flutter_markdown_plus: ^1.0.7
  pdf: ^3.11.3
  share_plus: ^12.0.1
  app_links: ^6.4.1
  flutter_secure_storage: ^10.0.0
  # Módulo Escala (plantões e procedimentos)
  provider: ^6.1.5+1
  uuid: ^4.5.2
  home_widget: ^0.9.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  fl_chart: ^0.69.0
  device_calendar: ^4.3.3
  image_picker: ^1.1.2
  sqflite: ^2.4.2
  path: ^1.9.1
  sentry_flutter: ^9.14.0
  # Push Notifications (FCM)
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - .env
    - cahves_api_openia.env
    - assets/farmacoteca/
    - assets/medicamentos/
    - assets/medicamentos_dose/
    - assets/data/inducoes.json
    - assets/data/condicoes/
    - web/icons/Icon-512.png
    - assets/imagen/splash_star.png
    - assets/imagen/logo_g_foreground_1024.png
    - assets/imagen/logo_g_bg_1024.png
    - assets/imagen/logo_margem_android_1024.png
    - assets/imagen/splash_logo_small_1024.png
    - assets/imagen/auth_background.png
    - assets/Assets.xcassets/AppIcon.appiconset/Icon-App-1024x1024@1x.png
    # Assets do módulo PCR
    - assets/pcr/images/
    - assets/pcr/sounds/

flutter_launcher_icons:
  android: "ic_launcher"
  image_path_android: "assets/imagen/logo_margem_android_1024.png"
  ios: true
  image_path_ios: "assets/imagen/logo_g_bg_1024.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/imagen/logo_g_bg_1024.png"
    background_color: "#1A2848"
    theme_color: "#1A2848"
  macos:
    generate: true
    image_path: "assets/imagen/logo_g_bg_1024.png"
  windows:
    generate: true
    image_path: "assets/imagen/logo_g_bg_1024.png"
  image_path: "assets/imagen/logo_g_bg_1024.png"
  adaptive_icon_background: "#1A2848"
  adaptive_icon_foreground: "assets/imagen/logo_g_foreground_1024.png"

flutter_native_splash:
  color: "#1A2848"
  image: assets/imagen/splash_logo_small_1024.png
  android_gravity: center
  ios_content_mode: center
  web_image_mode: center
  android: true
  ios: true
  android_12:
    image: assets/imagen/splash_logo_small_1024.png
    color: "#1A2848"
    icon_background_color: "#1A2848"
