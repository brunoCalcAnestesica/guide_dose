[build]
  publish = "auth/dist"
  command = "cd auth && npm install && npm run build"

[dev]
  command = "bash scripts/start-vite.sh"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
